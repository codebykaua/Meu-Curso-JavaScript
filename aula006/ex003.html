<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Programa</title>
    <style>

        body {
            background-color: antiquewhite;
        }

        h1, p {
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
    </style>

</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Já me livrei da Maldição</p>


    <script>
        var n1 = window.prompt('Digite um número: ')
        var n2 = window.prompt('Digite outro número: ')
 

        var soma = Number.parseInt(n1) +  Number.parseInt(n2) //Precisa ser adicionado o Number.parseInt(n)  para que o script reconheca que se trata de numeros inteiro, e usa o Number.parseFloat(n) para numero decimal

        window.alert('A soma dos valores é: ' + soma)
    </script>

</body>
</html>
